<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title | default: site.title }}</title>
<meta name="description" content="{{ site.description }}">

<!--
  Estilo "GitHub markdown" para o site inteiro:
  - github-markdown-css: replica a tipografia/cores/listas/tabelas do
    Markdown renderizado no próprio GitHub (inclusive modo claro/escuro
    automático, via prefers-color-scheme).
  - github.css (rouge/pygments theme): syntax highlight dos blocos de
    código igual ao usado pelo GitHub.
  - site.css: nosso CSS próprio, só com o "container" da página (largura,
    espaçamento, fundo) — tudo dentro de ".markdown-body" fica por conta
    do github-markdown-css.
-->

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-light.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jwarby/jekyll-pygments-themes@master/github.css">

<link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">

<!-- CSS específico da galeria de temas (lightbox), só afeta /gallery/ -->
<link rel="stylesheet" href="{{ '/assets/css/gallery.css' | relative_url }}">
