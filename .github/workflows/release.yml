name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION="$(sh .tools/setup.sh --version | awk '{print $2}')"
          echo "name=Release $VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          prev_tag="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)"
          git log --format="%s" --no-merges "${prev_tag}..HEAD" | grep -E '^(feat|bug|refactor):' | head -20 | sed 's/^/- /' > /tmp/release-notes.md
          echo "" >> /tmp/release-notes.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}" >> /tmp/release-notes.md
          cat /tmp/release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.version.outputs.name }}
          body_path: /tmp/release-notes.md
          generate_release_notes: false
