release:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/cli:latest

  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+.*$/

  before_script:
    - apk add --no-cache git openssh-client

  script:
    - . .tools/installer/libs/version.lib
    - |
      git log --pretty=format:"- %s" \
      $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD \
      > /tmp/release-notes.md

      echo "" >> /tmp/release-notes.md
      echo "**Full Changelog**: $CI_PROJECT_URL/-/commits/$CI_COMMIT_TAG" >> /tmp/release-notes.md

  release:
    tag_name: $CI_COMMIT_TAG
    name: "Release $VERSION"
    description: /tmp/release-notes.md
