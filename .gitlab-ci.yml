stages:
  - release

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/
  before_script:
    - apk add --no-cache bash git
  script:
    - VERSION="$(sh .tools/setup.sh --version | awk '{print $2}')"
    - echo "RELEASE_NAME=Release $VERSION" > /tmp/release_vars
    - |
      PREV_TAG=$(git describe --tags --abbrev=0 "${CI_COMMIT_TAG}^" 2>/dev/null \
        || git rev-list --max-parents=0 HEAD)
      git log --pretty=format:"- %s" "${PREV_TAG}..${CI_COMMIT_TAG}" \
        > /tmp/release-notes.md
      echo "" >> /tmp/release-notes.md
      echo "**Full Changelog**: ${CI_PROJECT_URL}/-/commits/${CI_COMMIT_TAG}" \
        >> /tmp/release-notes.md
  release:
    name: "Release $CI_COMMIT_TAG"
    description: "See CHANGELOG"
    tag_name: "$CI_COMMIT_TAG"
    ref: "$CI_COMMIT_TAG"
