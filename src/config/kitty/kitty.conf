# ================= SHELL =================
# shell /usr/bin/zsh

# ================= FONT =================
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# ================= WINDOW =================
background #181818
foreground #ffffff
color0  #000000
color8  #000000
background_opacity 1
window_padding_width 5
confirm_os_window_close 0
wayland_titlebar_color background
remember_window_size no
initial_window_width  130c
initial_window_height 35c
window_margin_width 2

# Dead keys / composition
input_delay 0

linux_display_server wayland

# Use "yes" with Window Manager
hide_window_decorations no

# ================= SCROLL =================
scrollback_lines 100000
scrollback_pager_history_size 100000

# ================= CURSOR =================
shell_integration no-cursor
# options: beam, underline and block
cursor_shape block
cursor_blink_interval 0.6
cursor_stop_blinking_after 15.0

# ================= TABS =================
# tab_title_template "tab {index}"
tab_title_template "{index}: {title}"
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style angled
tab_bar_min_tabs 1
active_tab_background   #1a1a1a
active_tab_foreground   #ffffff
inactive_tab_background #111111
inactive_tab_foreground #888888

# ================= SELECTION / HIGHLIGHT =================
selection_foreground #ffffff
selection_background #262626
copy_on_select yes
# color used by plugins like zsh-autosuggestions
url_color #1a8fff
url_style curly
detect_urls yes

# ===================== MOUSE =======================
# Right-click clipboard glue
mouse_map right press ungrabbed paste_from_clipboard

# ================= CURSOR COLORS =================
cursor #ffffff
cursor_text_color #000000

# ================= KEYBINDS GENERAL =================
map ctrl+shift+c copy_or_interrupt
map ctrl+shift+v paste_from_clipboard
map ctrl+q close_tab
map ctrl+n new_tab_with_cwd
map f11 toggle_fullscreen
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map ctrl+tab     next_tab
map ctrl+shift+tab previous_tab

# ================= SPLITS =================
map ctrl+shift+d launch --location=hsplit --cwd=current
map ctrl+shift+s launch --location=vsplit --cwd=current
# Navigating between splits
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down
# Close current split
map ctrl+shift+x close_window
# Enable useful layouts
enabled_layouts tall,fat,grid,splits,stack

# ================= HISTORY =================
# Skip to previous/next prompt on scrollback
map ctrl+shift+up   scroll_to_prompt -1
map ctrl+shift+down scroll_to_prompt 1
# Select the output of the last command.
map ctrl+shift+o    select_cmd_output

# ================= HINTS =================
# Open URL on hover without mouse (shows clickable text)
map ctrl+shift+e open_url_with_hints
# Copy path/file as text
map ctrl+shift+p>f kitten hints --type path --program @
# Copy URL as text
map ctrl+shift+p>u kitten hints --type url  --program @

# ================= FONT SIZE =================
map ctrl+equal  change_font_size all +1.0
map ctrl+minus  change_font_size all -1.0
map ctrl+0      change_font_size all 0

# ================= PERFORMANCE =================
repaint_delay 10
input_delay 3
sync_to_monitor yes
