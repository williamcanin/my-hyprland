[general]
mode = context
follow_monitor = true
show_workspace_badge = true
dismiss_modifier = alt
sticky_mode = false

[theme]
name = blasphemous-echoes-of-salt/theme.ini
border_width = 1
corner_radius = 8

[layout]
card_width = 150
card_height = 135
card_gap = 10
padding = 15
max_cols = 5
icon_size = 56

[icons]
show_letter_fallback = true

[font]
family = Terminus (TTF)
weight = Bold
title_size = none
